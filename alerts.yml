groups:

- name: system-alerts

  rules:

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 1m
    labels:
      severity: critical

    annotations:
      summary: "CPU élevé"
      description: "CPU > 80% depuis 1 minute"
